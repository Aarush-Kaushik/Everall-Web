<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- QR Code library (requires internet; gracefully degrades offline) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <!-- Chart.js for analytics (requires internet; falls back to text stats offline) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" defer></script>
  <!-- Prism.js for code editor syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js" defer></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="icon.ico" type="image/x-icon" />
</head>
<body class="theme-dark">

  <!-- ═══════════════════════════════════════════════ -->
  <!--  TOP BAR                                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <header id="topbar">
    <div id="topbar-left">
      <button id="sidebar-toggle" title="Toggle Sidebar">☰</button>
      <span id="app-logo">EVERALL PERSONAL MANAGEMENT SYSTEM</span>
    </div>
    <div id="topbar-center">
      <span id="topbar-title">Dashboard</span>
    </div>
    <div id="topbar-right">
      <span id="topbar-clock"></span>
      <button id="split-toggle" title="Toggle Split View" style="margin-right:8px;">◫</button>
      <button id="theme-toggle" title="Toggle theme">◐</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  SIDEBAR                                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <aside id="sidebar">
    <nav id="nav-list">
      <!-- dynamically populated by JS -->
    </nav>
    <div id="sidebar-profile"></div>
  </aside>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  MAIN PANEL                                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <main id="main-panel">
    <div id="module-container"></div>
  </main>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  GLOBAL MODAL                                   -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <button id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
